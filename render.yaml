services:
  - type: web
    name: courtiq
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 180
    disk:
      name: courtiq-db
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /data/basketball.db
